# Grafana dashboard provisioning: loads every dashboard JSON found in
# /var/lib/grafana/dashboards (mounted from observability/grafana/dashboards).

apiVersion: 1

providers:
  - name: shb-dashboards
    orgId: 1
    folder: "Hadaf"
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
