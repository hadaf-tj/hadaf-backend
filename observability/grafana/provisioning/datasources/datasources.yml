# Grafana datasource provisioning: wires Prometheus (metrics), Loki (logs) and
# Tempo (traces) automatically on startup so no manual UI setup is needed.
#
# Correlation is configured both ways:
#   - Loki  → Tempo: a derived field parses `trace_id` out of the JSON logs and
#     renders a "View trace" button.
#   - Tempo → Loki : tracesToLogs jumps from a span back to the correlated logs.

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: trace_id
          # Matches the trace_id field emitted by the app's structured logs.
          matcherType: regex
          matcherRegex: '"trace_id":"(\w+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        filterByTraceID: true
        tags:
          - key: service.name
            value: compose_service
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
