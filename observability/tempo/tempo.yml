# Grafana Tempo configuration (Phase 3) — single-binary, local-filesystem store.
# Receives traces from the OpenTelemetry Collector over OTLP/gRPC and serves
# them to Grafana. Sized for dev: filesystem backend, short retention.

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    # Keep traces for 48h in dev; raise/lower per cost budget (report §6 risks).
    block_retention: 48h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Generate service-graph and span metrics from incoming traces so the
# "service graph" works in Grafana without extra wiring.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
  traces_storage:
    path: /var/tempo/generator/traces

overrides:
  metrics_generator_processors: [service-graphs, span-metrics]
