# Alerting rules for the Hadaf backend.
#
# These are intentionally conservative starting points. Tune the thresholds
# against real traffic after the first week (see docs/observability-report.md).

groups:
  - name: shb-api
    rules:
      - alert: TargetDown
        expr: up{job="shb-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "App target is down"
          description: "Prometheus cannot scrape {{ $labels.instance }} for over 1 minute."

      - alert: HighErrorRate
        # More than 5% of requests returning 5xx over the last 5 minutes.
        expr: |
          sum(rate(shb_http_requests_total{status=~"5.."}[5m]))
            / sum(rate(shb_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate"
          description: "5xx error ratio is above 5% for 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: HighRequestLatencyP99
        # p99 request latency above 1s for 10 minutes.
        expr: |
          histogram_quantile(0.99,
            sum(rate(shb_http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High p99 request latency"
          description: "p99 latency is above 1s for 10 minutes (current: {{ $value }}s)."

      - alert: PanicsDetected
        expr: increase(shb_http_panics_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Panics recovered"
          description: "{{ $value }} panic(s) recovered by the HTTP middleware in the last 5 minutes."

      - alert: ExternalDependencyErrors
        # Any external dependency (sms/email/storage) erroring noticeably.
        expr: |
          sum by (service) (rate(shb_external_request_duration_seconds_count{status="error"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "External dependency errors: {{ $labels.service }}"
          description: "{{ $labels.service }} is returning errors for over 5 minutes."

      - alert: DBPoolExhaustion
        # Almost all pooled connections are in use.
        expr: shb_db_pool_acquired_conns / shb_db_pool_max_conns > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "Over 90% of the pool is acquired for 5 minutes — requests may start queueing."
