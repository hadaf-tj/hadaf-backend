# Promtail ships Docker container stdout logs into Loki.
#
# It uses Docker service discovery (via the mounted docker socket) so any
# container in the compose project is picked up automatically. The app logs in
# structured JSON (zerolog), which Grafana/Loki can parse on the fly in Explore.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use the container name (without the leading slash) as a label.
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # Compose project / service labels for filtering in Grafana.
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service
      - target_label: job
        replacement: docker
